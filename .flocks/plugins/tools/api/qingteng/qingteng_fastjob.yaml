name: qingteng_fastjob
description: >
  青藤快速任务（FastJob）工具。支持查看检测项列表、创建/编辑/删除/执行快速作业及查询执行结果。
  适用于对单台或多台主机快速执行安全检测和应急响应任务。
description_cn: >
  青藤快速任务（FastJob）工具。通过 `action` 参数访问快速任务的全部接口，
  包括任务模板查询、作业创建/执行/管理及结果查看。
category: custom
enabled: true
requires_confirmation: true
provider: qingteng
inputSchema:
  type: object
  properties:
    action:
      type: string
      description: |
        快速任务动作名，可选值：
        - task_list
          用途: 查询快速任务检测项模板列表
          常用: `osType`、`name`、`categories`、`page`、`size`
          是否任务型: 否
        - task_detail
          用途: 查询某一检测项模板的详细信息
          必填: `taskId`
          是否任务型: 否
        - job_create
          用途: 创建一个快速作业
          必填: `name`（或 `body`）
          常用: `name`、`osType`、`description`、`realm`、`taskType`、`taskId`、`taskParams`、`cron`、`cronEnable`
          风险提示: 写操作
          是否任务型: 否
        - job_update
          用途: 编辑已有快速作业
          必填: `jobId`
          常用: 同 `job_create`
          风险提示: 写操作
          是否任务型: 否
        - job_delete
          用途: 删除快速作业
          必填: `jobId`
          风险提示: 不可恢复
          是否任务型: 否
        - job_list
          用途: 查询快速作业列表
          常用: `osType`、`page`、`size`、`sorts`
          是否任务型: 否
        - job_execute
          用途: 立即执行某个快速作业
          必填: `id`（作业 ID）
          风险提示: 会在目标主机触发扫描
          是否任务型: 是
        - job_execute_list
          用途: 查询作业执行历史记录列表
          常用: `osType`、`page`、`size`、`sorts`
          是否任务型: 否
        - task_result
          用途: 查看某次执行记录的结果
          必填: `taskRecordId`
          是否任务型: 否
        - task_error
          用途: 查看某次执行记录中失败的主机列表
          必填: `taskRecordId`
          是否任务型: 否
      enum:
        - task_list
        - task_detail
        - job_create
        - job_update
        - job_delete
        - job_list
        - job_execute
        - job_execute_list
        - task_result
        - task_error
    taskId:
      type: string
      description: 快速任务检测项 ID，适用于 `task_detail` 和 `job_create`
    jobId:
      type: string
      description: 快速作业 ID，适用于 `job_update`、`job_delete`
    id:
      type: string
      description: 作业 ID，适用于 `job_execute`
    taskRecordId:
      type: string
      description: 执行记录 ID，适用于 `task_result` 和 `task_error`
    name:
      type: string
      description: 作业名称，`job_create`/`job_update` 必填
    osType:
      type: integer
      description: 操作系统类型，1=Linux，2=Windows
      enum:
        - 1
        - 2
    description:
      type: string
      description: 作业描述
    realm:
      type: object
      description: 作业目标主机范围。示例：`{"type":0}` 表示全部主机；`{"type":1,"agents":["agentId1"]}` 表示指定主机
    realmName:
      type: string
      description: 主机范围名称（显示用）
    taskType:
      type: integer
      description: 任务类型
    taskParams:
      type: array
      items:
        type: object
      description: 任务参数列表
    cron:
      type: string
      description: Cron 表达式，用于定时执行
    cronEnable:
      type: boolean
      description: 是否启用定时执行
    categories:
      type: array
      items:
        type: string
      description: 检测项分类过滤，如 `["安全检测", "应急响应"]`
    ids:
      type: array
      items:
        type: string
      description: 检测项 ID 列表过滤
    updatedTimeRange:
      type: object
      description: '更新时间范围过滤，格式 {"min": "yyyy-MM-dd HH:mm:ss", "max": "yyyy-MM-dd HH:mm:ss"}'
    page:
      type: integer
      description: 页码，从 0 开始
      default: 0
    size:
      type: integer
      description: 每页数量
      default: 20
    sorts:
      type: string
      description: 排序字段
    query:
      type: object
      description: 额外 GET 查询参数对象
    body:
      type: object
      description: POST/PUT/DELETE 请求体对象，与对应字段参数合并
  required:
    - action

handler:
  type: script
  script_file: qingteng_fastjob.handler.py
  function: fastjob

notes: |
  调用流程:
  1. 自动使用已配置的凭据登录青藤，获取 jwt/signKey/comId
  2. 对请求参数进行 SHA1 签名
  3. 调用对应 /external/api/fastjob/... 接口

  典型用法:
  - 先用 `task_list` 找到需要运行的检测项 `taskId`
  - 用 `job_create` 创建作业，指定 `taskId` 和主机范围 `realm`
  - 用 `job_execute` 立即触发执行，获取 `taskRecordId`
  - 用 `task_result` 查看结果，`task_error` 查看失败主机
