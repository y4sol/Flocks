name: qingteng_detect
description: >
  青藤入侵检测分组工具。通过 `action` 参数访问可疑操作、暴力破解、异常登录规则、
  Web 后门、后门检测和网络蜜罐相关接口。
description_cn: >
  青藤入侵检测分组工具。覆盖检测查询、封停控制、规则管理和蜜罐配置。
category: custom
enabled: true
requires_confirmation: true
provider: qingteng
inputSchema:
  type: object
  properties:
    action:
      type: string
      description: |
        检测分组动作名，可选值：
        - shelllog_list
          用途: 查询 Linux 可疑操作结果
          必填: 无
          常用: `page`、`size`、`sorts`、`keyword`
          风险提示: 建议带分页
          是否任务型: 否
        - brutecrack_list / brutecrack_log / brutecrack_block
          用途: 暴力破解结果、记录与封停控制
          必填: `os_type`
          常用: `hostId`、`ip`、`account`、`status`、`begin_time`、`end_time`、`block`、`duration`
          风险提示: `brutecrack_block` 为高风险写操作
          是否任务型: 否
        - abnormallogin_list
          用途: 查询异常登录结果
          必填: `os_type`
          常用: `page`、`size`、`keyword`、`hostId`、`ip`、`account`、`begin_time`、`end_time`
          风险提示: 无
          是否任务型: 否
        - abnormallogin_rule_set / abnormallogin_rule_get / abnormallogin_rule_list / abnormallogin_rule_delete
          用途: 异常登录规则增删改查
          必填: `os_type`；单条查询/删除还需要 `id`
          常用: `rule_name`、`source_ips`、`target_ips`、`users`、`ports`、`enabled`
          风险提示: 写操作会直接影响告警策略
          是否任务型: 否
        - webshell_list / webshell_scan / webshell_scan_status / webshell_download
          用途: Web 后门结果、扫描、状态和文件下载
          必填: `os_type`；下载需要 `download_id`
          常用: `page`、`size`、`severity`、`status`、`hostId`、`groups`、`file_path`、`hostIds`
          风险提示: 下载动作通常依赖已有下载任务 ID；列表类专属字段误传会被拦截
          是否任务型: `scan` 为是
        - bounceshell_list
          用途: 查询反弹 Shell 检测结果
          必填: 无（`os_type` 可选，不传默认 `linux`；传 `win` 查询 Windows）
          常用: `page`、`size`、`sorts`、`groups`
          是否任务型: 否
        - localrights_list
          用途: 查询本地提权检测结果（仅 Linux）
          必填: 无
          常用: `page`、`size`、`sorts`、`groups`
          是否任务型: 否
        - backdoor_list / backdoor_scan / backdoor_scan_status
          用途: Linux/Windows 后门检测查询与扫描
          必填: `os_type`
          常用: `page`、`size`、`severity`、`status`、`hostId`、`groups`
          风险提示: 扫描类接口建议缩小主机范围
          是否任务型: `scan` 为是
        - honeypot_list / honeypot_rule_create / honeypot_rules_create / honeypot_rule_delete / honeypot_rules_delete / honeypot_rule_list / honeypot_rule_get / honeypot_rule_update / honeypot_rule_enable
          用途: 网络蜜罐结果查询与规则管理
          必填: `os_type`；单条查询/删除通常需要 `id`
          常用: `name`、`port`、`protocol`、`enabled`、`rule`、`rules`
          风险提示: 写操作会直接改变拦截和诱捕策略
          是否任务型: 否
      enum:
        - shelllog_list
        - brutecrack_list
        - brutecrack_log
        - brutecrack_block
        - abnormallogin_list
        - bounceshell_list
        - localrights_list
        - abnormallogin_rule_set
        - abnormallogin_rule_get
        - abnormallogin_rule_list
        - abnormallogin_rule_delete
        - webshell_list
        - webshell_scan
        - webshell_scan_status
        - webshell_download
        - backdoor_list
        - backdoor_scan
        - backdoor_scan_status
        - honeypot_list
        - honeypot_rule_create
        - honeypot_rules_create
        - honeypot_rule_delete
        - honeypot_rules_delete
        - honeypot_rule_list
        - honeypot_rule_get
        - honeypot_rule_update
        - honeypot_rule_enable
    os_type:
      type: string
      description: 操作系统类型，常用 `linux` 或 `win`
      enum:
        - linux
        - win
    id:
      type: string
      description: 规则 ID，适用于单条规则查询和删除
    download_id:
      type: string
      description: Web 后门下载任务 ID
    page:
      type: integer
      description: GET 分页页码，从 0 开始
      default: 0
    size:
      type: integer
      description: GET 每页数量
      default: 20
    sorts:
      type: string
      description: GET 排序字段
    keyword:
      type: string
      description: 通用关键词筛选
    groups:
      type: string
      description: 多值分组条件，逗号分隔
    severity:
      type: string
      description: 严重级别筛选
    status:
      type: string
      description: 状态筛选
    begin_time:
      type: string
      description: 开始时间筛选
    end_time:
      type: string
      description: 结束时间筛选
    hostId:
      type: string
      description: 主机 ID 筛选
    hostIds:
      type: array
      items:
        type: string
      description: 主机 ID 列表
    file_path:
      type: string
      description: 文件路径筛选，适合 `webshell_list`
    ip:
      type: string
      description: IP 地址
    account:
      type: string
      description: 账号名
    block:
      type: boolean
      description: 是否封停
    duration:
      type: integer
      description: 封停时长
    reason:
      type: string
      description: 封停原因
    rule_name:
      type: string
      description: 规则名称
    source_ips:
      type: array
      items:
        type: string
      description: 源 IP 列表
    target_ips:
      type: array
      items:
        type: string
      description: 目标 IP 列表
    users:
      type: array
      items:
        type: string
      description: 用户列表
    ports:
      type: array
      items:
        type: integer
      description: 端口列表
    enabled:
      type: boolean
      description: 规则是否启用
    name:
      type: string
      description: 蜜罐规则名称
    port:
      type: integer
      description: 蜜罐监听端口
    protocol:
      type: string
      description: 协议类型
    rule:
      type: object
      description: 单条蜜罐规则对象
    rules:
      type: array
      items:
        type: object
      description: 批量蜜罐规则对象列表
    ids:
      type: array
      items:
        type: string
      description: 批量删除时使用的规则 ID 列表
    taskName:
      type: string
      description: 扫描任务名称
    query:
      type: object
      description: 额外 GET 查询参数对象
    body:
      type: object
      description: POST/PUT/DELETE 请求体对象
  required:
    - action
handler:
  type: script
  script_file: qingteng.handler.py
  function: detect
