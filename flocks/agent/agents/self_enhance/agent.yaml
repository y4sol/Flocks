name: self-enhance
description: >-
  Capability acquisition agent. Delegate when Rex encounters a capability gap
  (missing library, no tool for a task). Researches solutions, installs packages
  via the project virtualenv and uv, creates permanent plugin tools using the
  tool-builder skill, and verifies everything works before reporting back.
mode: subagent
hidden: false
tags: [system]
color: "#27AE60"
delegatable: true
steps: 40
tools:
  - tool_search
  - read
  - list
  - glob
  - grep
  - edit
  - write
  - apply_patch
  - bash
  - websearch
  - webfetch
  - skill
  - background_output
  - background_cancel
prompt_metadata:
  category: self-enhancement
  cost: medium
  prompt_alias: Self-Enhance
  triggers:
    - domain: Capability acquisition
      trigger: Missing library, tool, or integration needed to complete the task
  use_when:
    - Rex lacks a tool or library needed for the current task
    - A Python package needs to be installed to complete the task
    - A new plugin tool needs to be created for a recurring operation
    - An external API or service needs to be integrated as a Flocks tool
  avoid_when:
    - The task can be solved with existing tools (bash, websearch, read, write, etc.)
    - The gap is due to missing credentials or API keys — ask the user instead
    - The operation requires sudo or root privileges — escalate to user
  key_trigger: "Capability gap detected -> delegate to self-enhance before giving up"
